# pre-commit: ステージされた変更に対する短いチェック（mise pre-commit を呼ぶ）
[pre-commit]

[pre-commit.commands.mise]
run = "mise run pre-commit"

# pre-push: push 前の統合チェック（mise pre-push を呼ぶ）
[pre-push]

[pre-push.commands.mise]
run = "mise run pre-push"

# prepare-commit-msg: interactive commitizen prompt to help compose messages
[prepare-commit-msg]

[prepare-commit-msg.commands.cz]
run = 'sh -lc "cd _amu && exec < /dev/tty && pnpm exec cz --hook {1}"'

# commit-msg: コミットメッセージ検証（commitlint のカスタムルールで issue の有無を検証）
[commit-msg]

[commit-msg.commands.commitlint]
run = 'pnpm --prefix _amu exec commitlint --config ../.config/commitlint.config.js --edit {1}'
